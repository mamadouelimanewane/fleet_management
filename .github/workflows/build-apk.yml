name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: driver-app/package-lock.json

    - name: Install dependencies
      working-directory: ./driver-app
      run: npm install

    - name: Build Web App
      working-directory: ./driver-app
      run: npm run build

    - name: Add and Sync Capacitor Android
      working-directory: ./driver-app
      run: |
        npx cap add android
        npx cap sync android

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Make gradlew executable
      working-directory: ./driver-app/android
      run: chmod +x ./gradlew

    - name: Build APK (Debug)
      working-directory: ./driver-app/android
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: driver-app-apk
        path: driver-app/android/app/build/outputs/apk/debug/app-debug.apk
